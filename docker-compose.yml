# Neuromesh E2E local development stack
#
# Requirements: Linux host with Docker Engine (eBPF sensor needs kernel BPF support).
# Usage:
#   docker compose up --build
#   curl http://localhost:8080/healthz
#   docker compose logs -f ai-threat-detector agent-ebpf-sensor

name: neuromesh

services:
  kafka:
    image: apache/kafka:3.9.0
    hostname: kafka
    ports:
      - "9092:9092"
    environment:
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      # Kafka 3.9 (KAFKA-18281): avoid 0.0.0.0 bind addresses; omit CONTROLLER from advertised listeners.
      KAFKA_LISTENERS: EXTERNAL://:9092,INTERNAL://:9094,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: EXTERNAL://localhost:9092,INTERNAL://kafka:9094
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT,INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 >/dev/null 2>&1",
        ]
      interval: 10s
      timeout: 10s
      retries: 6
      start_period: 30s
    networks:
      - neuromesh

  zt-policy-engine:
    build:
      context: ./apps/zt-policy-engine
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      ZT_POLICY_ENGINE_PORT: "8080"
      # This E2E/local dev stack has no SPIRE agent and this compose file's
      # services never present or verify a SPIFFE X.509-SVID (the E2E flow
      # only exercises the Kafka -> ai-threat-detector -> QueryService
      # surface, never /v1/evaluate). Explicit, loud opt-in only -- see
      # internal/identity/spiffe_validator.go; this must never be set in a
      # real deployment, where NEUROMESH_SPIFFE_TRUST_BUNDLE_MODE is required.
      NEUROMESH_INSECURE_MOCK_IDENTITY: "true"
    healthcheck:
      disable: true
    networks:
      - neuromesh

  ai-threat-detector:
    build:
      context: ./apps/ai-threat-detector
      dockerfile: Dockerfile
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      NEUROMESH_KAFKA_BROKERS: kafka:9094
      NEUROMESH_KAFKA_TOPIC: neuromesh.telemetry.v1
      NEUROMESH_KAFKA_GROUP_ID: ai-threat-detector
    networks:
      - neuromesh

  agent-ebpf-sensor:
    build:
      context: .
      dockerfile: apps/agent-ebpf-sensor/Dockerfile
    privileged: true
    pid: "host"
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      RUST_LOG: info
      NEUROMESH_KAFKA_BROKERS: kafka:9094
      NEUROMESH_KAFKA_TOPIC: neuromesh.telemetry.v1
      NEUROMESH_NODE_NAME: neuromesh-dev
    volumes:
      - /sys/fs/bpf:/sys/fs/bpf
      - /sys/kernel/debug:/sys/kernel/debug
      - /sys/kernel/tracing:/sys/kernel/tracing:ro
    cap_add:
      - BPF
      - SYS_ADMIN
      - SYS_PTRACE
      - PERFMON
    networks:
      - neuromesh

networks:
  neuromesh:
    driver: bridge
