[package]
name = "agent-ebpf-sensor"
version = "0.1.0"
edition = "2021"

[lib]
name = "agent_ebpf_sensor"
path = "src/lib.rs"

[[bin]]
name = "agent-ebpf-sensor"
path = "src/main.rs"
required-features = ["orchestrator"]

[features]
default = []
orchestrator = []

[dependencies]
neuromesh-common = { path = "../../packages/neuromesh-common", default-features = false, features = ["user"] }
chrono = { version = "0.4", default-features = false, features = ["clock", "std"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
aya = "0.14.0"
tokio = { version = "1.36", features = [
    "macros",
    "rt-multi-thread",
    "signal",
    "net",
    "time",
    "io-util",
] }
anyhow = "1.0"
env_logger = "0.11"
log = "0.4"

[package.metadata.coverage]
minimum-line-coverage = 70

[dev-dependencies]
criterion = { workspace = true }

[[bench]]
name = "detection_pipeline"
harness = false
