[package]
name = "agent-ebpf-sensor"
version = "0.1.0"
edition = "2021"

[dependencies]
aya = "0.14.0"
neuromesh-common = { path = "../../packages/neuromesh-common", default-features = false, features = ["user"] }
tokio = { version = "1.36", features = [
    "macros",
    "rt-multi-thread",
    "signal",
    "net",
    "time",
    "io-util",
] }
anyhow = "1.0"
chrono = { version = "0.4", default-features = false, features = ["clock", "std"] }
env_logger = "0.11"
log = "0.4"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
