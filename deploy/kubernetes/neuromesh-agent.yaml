---
apiVersion: v1
kind: Namespace
metadata:
  name: neuromesh-system
  labels:
    app.kubernetes.io/name: neuromesh
    app.kubernetes.io/part-of: neuromesh
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: neuromesh-agent
  namespace: neuromesh-system
  labels:
    app.kubernetes.io/name: neuromesh-agent
    app.kubernetes.io/component: ebpf-sensor
    app.kubernetes.io/part-of: neuromesh
    app.kubernetes.io/version: "0.1.0"
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: neuromesh-agent
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: neuromesh-agent
        app.kubernetes.io/component: ebpf-sensor
        app.kubernetes.io/part-of: neuromesh
      annotations:
        container.apparmor.security.beta.kubernetes.io/agent: unconfined
    spec:
      serviceAccountName: neuromesh-agent
      hostPID: true
      hostNetwork: false
      dnsPolicy: ClusterFirstWithHostNet
      priorityClassName: system-node-critical
      tolerations:
        - operator: Exists
          effect: NoSchedule
        - operator: Exists
          effect: NoExecute
      nodeSelector:
        kubernetes.io/os: linux
      containers:
        - name: agent
          image: ghcr.io/neuromesh-security/agent-ebpf-sensor:0.1.0
          imagePullPolicy: IfNotPresent
          command: ["/usr/local/bin/agent-ebpf-sensor"]
          env:
            - name: RUST_LOG
              value: info
            - name: NEUROMESH_NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            # Issue #44 Phase 1: Cosign static public key (same key material
            # intended for image signing / webhook verify). Manifest+sig are
            # baked into the image; the public key is mounted so the trust
            # root is not solely under the same writeable rootfs as the
            # attested artifacts. (Admission webhook enforcement of image
            # Cosign signatures is a separate deploy dependency — not shipped
            # under deploy/ today.)
            - name: NEUROMESH_COSIGN_PUBLIC_KEY_PATH
              value: /etc/neuromesh/cosign/cosign.pub
            - name: NEUROMESH_BYTECODE_MANIFEST_PATH
              value: /etc/neuromesh/bytecode-manifest.json
            - name: NEUROMESH_BYTECODE_MANIFEST_SIG_PATH
              value: /etc/neuromesh/bytecode-manifest.sig
            # Issue #55: shared bearer for GET /v1/policy-bundle (Secret mount).
            - name: NEUROMESH_POLICY_BUNDLE_TOKEN_FILE
              value: /etc/neuromesh/policy-bundle/token
          securityContext:
            privileged: true
            runAsUser: 0
            runAsGroup: 0
            allowPrivilegeEscalation: true
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
              add:
                - BPF
                - SYS_ADMIN
                - SYS_RESOURCE
                - PERFMON
                - SYS_PTRACE
          volumeMounts:
            - name: sys-fs-bpf
              mountPath: /sys/fs/bpf
            - name: debugfs
              mountPath: /sys/kernel/debug
              readOnly: true
            - name: tracefs
              mountPath: /sys/kernel/tracing
              readOnly: true
            - name: host-root
              mountPath: /host
              readOnly: true
              mountPropagation: HostToContainer
            - name: tmp
              mountPath: /tmp
            - name: cosign-pubkey
              mountPath: /etc/neuromesh/cosign
              readOnly: true
            - name: policy-bundle-token
              mountPath: /etc/neuromesh/policy-bundle
              readOnly: true
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            exec:
              command: ["/bin/sh", "-c", "pgrep -x agent-ebpf-sensor"]
            initialDelaySeconds: 15
            periodSeconds: 30
      volumes:
        - name: sys-fs-bpf
          hostPath:
            path: /sys/fs/bpf
            type: DirectoryOrCreate
        - name: debugfs
          hostPath:
            path: /sys/kernel/debug
            type: Directory
        - name: tracefs
          hostPath:
            path: /sys/kernel/tracing
            type: Directory
        - name: host-root
          hostPath:
            path: /
            type: Directory
        - name: tmp
          emptyDir: {}
        # Provision with the Cosign static public key (same keypair used for
        # GHCR image signing and bytecode-manifest sign-blob in CI):
        #   kubectl -n neuromesh-system create secret generic neuromesh-cosign-pubkey \
        #     --from-file=cosign.pub=./cosign.pub
        - name: cosign-pubkey
          secret:
            secretName: neuromesh-cosign-pubkey
            items:
              - key: cosign.pub
                path: cosign.pub
        # Issue #55: shared policy-bundle bearer token (same Secret class as Cosign):
        #   kubectl -n neuromesh-system create secret generic neuromesh-policy-bundle-token \
        #     --from-literal=token="$$(openssl rand -hex 32)"
        - name: policy-bundle-token
          secret:
            secretName: neuromesh-policy-bundle-token
            items:
              - key: token
                path: token
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: neuromesh-agent
  namespace: neuromesh-system
  labels:
    app.kubernetes.io/name: neuromesh-agent
    app.kubernetes.io/part-of: neuromesh
