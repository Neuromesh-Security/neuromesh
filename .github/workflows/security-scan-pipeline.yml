name: Security Scan Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: security-scan-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write

env:
  GO_VERSION: "1.25"
  PYTHON_VERSION: "3.12"

jobs:
  sast-gosec:
    name: SAST — Go (gosec)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module:
          - apps/zt-policy-engine
          - apps/k8s-admission-webhook
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: |
            apps/zt-policy-engine/go.sum
            apps/k8s-admission-webhook/go.sum

      - name: Install gosec
        run: go install github.com/securego/gosec/v2/cmd/gosec@latest

      - name: Download Go module dependencies
        working-directory: ${{ matrix.module }}
        run: go mod download

      - name: Run gosec
        working-directory: ${{ matrix.module }}
        run: gosec -fmt sarif -out gosec.sarif ./...

      - name: Upload gosec SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: ${{ matrix.module }}/gosec.sarif
          category: gosec-${{ matrix.module }}

  sast-cargo-audit:
    name: SAST — Rust (cargo-audit)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Rust Stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo-audit install
        uses: actions/cache@v4
        id: cache-cargo-audit
        with:
          path: ~/.cargo/bin/cargo-audit
          key: cargo-audit-${{ runner.os }}-v1

      - name: Install cargo-audit
        if: steps.cache-cargo-audit.outputs.cache-hit != 'true'
        run: cargo install cargo-audit --locked

      - name: Run cargo-audit
        run: cargo audit --deny warnings

  sast-bandit:
    name: SAST — Python (bandit)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/ai-threat-detector
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: apps/ai-threat-detector/requirements.txt

      - name: Install bandit
        run: pip install 'bandit[toml]>=1.7.5'

      - name: Run bandit
        run: |
          bandit -r src main.py \
            -f json \
            -o bandit.json \
            -ll

      - name: Upload bandit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bandit-ai-threat-detector
          path: bandit.json
          retention-days: 30

  supply-chain:
    name: SBOM & Container Scan (${{ matrix.image }})
    runs-on: ubuntu-latest
    needs: [sast-gosec, sast-cargo-audit, sast-bandit]
    env:
      # Enterprise policy: block only fixable HIGH/CRITICAL findings.
      TRIVY_IGNORE_UNFIXED: "true"
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: neuromesh-zt-policy-engine
            context: apps/zt-policy-engine
            dockerfile: Dockerfile
          - image: neuromesh-ai-threat-detector
            context: apps/ai-threat-detector
            dockerfile: Dockerfile
          - image: neuromesh-agent-ebpf-sensor
            context: .
            dockerfile: apps/agent-ebpf-sensor/Dockerfile
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          tags: ${{ matrix.image }}:ci
          load: true
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}

      - name: Generate SBOM (SPDX)
        uses: anchore/sbom-action@v0
        with:
          image: ${{ matrix.image }}:ci
          format: spdx-json
          output-file: ${{ matrix.image }}-sbom.spdx.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ matrix.image }}
          path: ${{ matrix.image }}-sbom.spdx.json
          retention-days: 30

      - name: Scan image for CVEs (Trivy)
        uses: aquasecurity/trivy-action@v0.28.0
        with:
          scan-type: image
          image-ref: ${{ matrix.image }}:ci
          scanners: vuln
          vuln-type: os,library
          format: sarif
          output: trivy-${{ matrix.image }}.sarif
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: "true"
          hide-progress: "true"
          limit-severities-for-sarif: "true"

      - name: Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-${{ matrix.image }}.sarif
          category: trivy-${{ matrix.image }}
