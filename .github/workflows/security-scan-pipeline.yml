name: Security Scan Pipeline

on:
  push:
    branches: [main]
    # Non-core services (see experimental-ci.yml) have their own,
    # independent SAST/SBOM/Trivy pipeline -- see sast-bandit and
    # supply-chain notes below. A push/PR touching ONLY those paths must
    # not trigger this core workflow at all.
    paths-ignore:
      - apps/ai-threat-detector/**
      - apps/security-dashboard/**
  pull_request:
    branches: [main]
    paths-ignore:
      - apps/ai-threat-detector/**
      - apps/security-dashboard/**
  # The nightly schedule is intentionally NOT path-filtered (schedule
  # triggers ignore paths-ignore/paths entirely) -- it always does a full
  # repo sweep regardless of what changed, which is correct for a
  # scheduled security scan.
  schedule:
    - cron: "0 3 * * *"

concurrency:
  group: security-scan-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write

env:
  GO_VERSION: "1.25.12"
  GOSEC_VERSION: "v2.22.4"
  # PYTHON_VERSION removed: its only consumer (sast-bandit) moved to
  # experimental-ci.yml, which declares its own PYTHON_VERSION.

jobs:
  filesystem-trivy:
    name: Trivy — Filesystem
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run Trivy filesystem scan (report)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: "fs"
          scan-ref: ${{ github.workspace }}
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: 0
          format: sarif
          output: trivy-fs.sarif

      - name: Enforce Trivy filesystem gate (CRITICAL only)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: "fs"
          scan-ref: ${{ github.workspace }}
          severity: CRITICAL
          ignore-unfixed: true
          exit-code: 1
          format: table
          skip-setup-trivy: true

      - name: Upload Trivy filesystem SARIF
        if: always() && hashFiles('trivy-fs.sarif') != ''
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-filesystem

      - name: Upload Trivy filesystem report artifact
        if: always() && hashFiles('trivy-fs.sarif') != ''
        uses: actions/upload-artifact@v4
        with:
          name: trivy-filesystem-sarif
          path: trivy-fs.sarif
          retention-days: 30

  semgrep:
    name: Semgrep — Static Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run Semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          config: p/ci

  sast-gosec:
    name: SAST — Go (gosec)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        module:
          - apps/zt-policy-engine
          - apps/k8s-admission-webhook
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: ${{ matrix.module }}/go.sum

      - name: Download Go module dependencies
        working-directory: ${{ matrix.module }}
        run: |
          go mod download
          go mod verify

      - name: Install gosec
        run: go install github.com/securego/gosec/v2/cmd/gosec@${{ env.GOSEC_VERSION }}

      - name: Run gosec
        working-directory: ${{ matrix.module }}
        run: gosec -fmt sarif -out gosec.sarif ./...

      - name: Upload gosec SARIF
        if: always() && hashFiles(format('{0}/gosec.sarif', matrix.module)) != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: ${{ matrix.module }}/gosec.sarif
          category: gosec-${{ matrix.module }}

  sast-cargo-audit:
    name: SAST — Rust (cargo-audit)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Rust Stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-audit (rustsec)
        run: cargo install cargo-audit --locked

      - name: Run cargo-audit
        run: cargo audit --deny warnings

  sast-cargo-deny:
    name: SAST — Rust (cargo-deny)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Rust Stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-deny
        run: cargo install cargo-deny --locked

      - name: Run cargo-deny
        run: |
          if [ -f deny.toml ]; then
            cargo deny check
          else
            echo "::warning::deny.toml not found — running advisories check only"
            cargo deny check advisories
          fi

  # sast-bandit (Python/bandit SAST for apps/ai-threat-detector) moved to
  # .github/workflows/experimental-ci.yml (2026-07-17 CI blast-radius
  # review): this job used to be a hard `needs:` prerequisite for the
  # supply-chain SBOM jobs below, meaning a bandit finding in this non-core
  # service could prevent agent-ebpf-sensor's and zt-policy-engine's own
  # SBOM/Trivy container scans from ever running. It now runs
  # independently, gated only on apps/ai-threat-detector/** changes, with
  # identical rigor (same bandit invocation, same severity flags).

  # Honest job naming (Issue #67 / same class as #52 / PR #59): do NOT put
  # `${{ matrix.image }}` in `name:`. When a matrix job is skipped because a
  # `needs:` dependency failed, GitHub cannot expand matrix context and
  # renders the expression literally in the Checks UI. Split into two
  # discrete jobs with hardcoded names (same pattern as
  # experimental-ci.yml's `SBOM & Container Scan (neuromesh-ai-threat-detector)`
  # and the static `SAST — Go (gosec)` name above). Names stay correct when
  # skipped and when executed; coverage unchanged.
  supply-chain-zt-policy-engine:
    name: SBOM & Container Scan (neuromesh-zt-policy-engine)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # neuromesh-ai-threat-detector intentionally NOT here — see the
    # sast-bandit note above. Its SBOM/Trivy container scan runs in
    # experimental-ci.yml, independent of these core-only prerequisites.
    needs:
      - filesystem-trivy
      - semgrep
      - sast-gosec
      - sast-cargo-audit
      - sast-cargo-deny
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: apps/zt-policy-engine
          file: apps/zt-policy-engine/Dockerfile
          tags: neuromesh-zt-policy-engine:ci
          load: true
          cache-from: type=gha,scope=neuromesh-zt-policy-engine
          cache-to: type=gha,mode=max,scope=neuromesh-zt-policy-engine

      - name: Generate SBOM (SPDX)
        uses: anchore/sbom-action@v0
        with:
          image: neuromesh-zt-policy-engine:ci
          format: spdx-json
          output-file: neuromesh-zt-policy-engine-sbom.spdx.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-neuromesh-zt-policy-engine
          path: neuromesh-zt-policy-engine-sbom.spdx.json
          retention-days: 30

      - name: Scan image for CVEs (Trivy report)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: image
          image-ref: neuromesh-zt-policy-engine:ci
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: 0
          format: sarif
          output: trivy-neuromesh-zt-policy-engine.sarif

      - name: Enforce Trivy container gate (CRITICAL only)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: image
          image-ref: neuromesh-zt-policy-engine:ci
          severity: CRITICAL
          ignore-unfixed: true
          exit-code: 1
          format: table
          skip-setup-trivy: true

      - name: Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-neuromesh-zt-policy-engine.sarif
          category: trivy-neuromesh-zt-policy-engine

  supply-chain-agent-ebpf-sensor:
    name: SBOM & Container Scan (neuromesh-agent-ebpf-sensor)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs:
      - filesystem-trivy
      - semgrep
      - sast-gosec
      - sast-cargo-audit
      - sast-cargo-deny
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/agent-ebpf-sensor/Dockerfile
          tags: neuromesh-agent-ebpf-sensor:ci
          load: true
          cache-from: type=gha,scope=neuromesh-agent-ebpf-sensor
          cache-to: type=gha,mode=max,scope=neuromesh-agent-ebpf-sensor

      - name: Generate SBOM (SPDX)
        uses: anchore/sbom-action@v0
        with:
          image: neuromesh-agent-ebpf-sensor:ci
          format: spdx-json
          output-file: neuromesh-agent-ebpf-sensor-sbom.spdx.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-neuromesh-agent-ebpf-sensor
          path: neuromesh-agent-ebpf-sensor-sbom.spdx.json
          retention-days: 30

      - name: Scan image for CVEs (Trivy report)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: image
          image-ref: neuromesh-agent-ebpf-sensor:ci
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: 0
          format: sarif
          output: trivy-neuromesh-agent-ebpf-sensor.sarif

      - name: Enforce Trivy container gate (CRITICAL only)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: image
          image-ref: neuromesh-agent-ebpf-sensor:ci
          severity: CRITICAL
          ignore-unfixed: true
          exit-code: 1
          format: table
          skip-setup-trivy: true

      - name: Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-neuromesh-agent-ebpf-sensor.sarif
          category: trivy-neuromesh-agent-ebpf-sensor
