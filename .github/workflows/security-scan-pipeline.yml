name: Security Scan Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 3 * * *"

concurrency:
  group: security-scan-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write

env:
  GO_VERSION: "1.25"
  PYTHON_VERSION: "3.12"

jobs:
  filesystem-trivy:
    name: Trivy — Filesystem
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: 1
          format: sarif
          output: trivy-fs.sarif

      - name: Upload Trivy filesystem SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-filesystem

  semgrep:
    name: Semgrep — Static Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run Semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          config: p/ci

  sast-gosec:
    name: SAST — Go (gosec)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: true
      matrix:
        module:
          - apps/zt-policy-engine
          - apps/k8s-admission-webhook
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: |
            apps/zt-policy-engine/go.sum
            apps/k8s-admission-webhook/go.sum

      - name: Install gosec
        run: go install github.com/securego/gosec/v2/cmd/gosec@latest

      - name: Download Go module dependencies
        working-directory: ${{ matrix.module }}
        run: go mod download

      - name: Run gosec
        working-directory: ${{ matrix.module }}
        run: gosec -fmt sarif -out gosec.sarif ./...

      - name: Upload gosec SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: ${{ matrix.module }}/gosec.sarif
          category: gosec-${{ matrix.module }}

  sast-cargo-audit:
    name: SAST — Rust (cargo-audit)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Rust Stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-audit (rustsec)
        run: cargo install cargo-audit --locked

      - name: Run cargo-audit
        run: cargo audit --deny warnings

  sast-cargo-deny:
    name: SAST — Rust (cargo-deny)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Rust Stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-deny
        run: cargo install cargo-deny --locked

      - name: Run cargo-deny
        run: |
          if [ -f deny.toml ]; then
            cargo deny check
          else
            echo "::warning::deny.toml not found — running advisories check only"
            cargo deny check advisories
          fi

  sast-bandit:
    name: SAST — Python (bandit)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: apps/ai-threat-detector
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: apps/ai-threat-detector/requirements.txt

      - name: Install bandit
        run: pip install 'bandit[toml]>=1.7.5'

      - name: Run bandit
        run: |
          bandit -r src main.py \
            -f json \
            -o bandit.json \
            -ll

      - name: Upload bandit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bandit-ai-threat-detector
          path: bandit.json
          retention-days: 30

  supply-chain:
    name: SBOM & Container Scan (${{ matrix.image }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs:
      - filesystem-trivy
      - semgrep
      - sast-gosec
      - sast-cargo-audit
      - sast-cargo-deny
      - sast-bandit
    strategy:
      fail-fast: true
      matrix:
        include:
          - image: neuromesh-zt-policy-engine
            context: apps/zt-policy-engine
            dockerfile: apps/zt-policy-engine/Dockerfile
          - image: neuromesh-ai-threat-detector
            context: apps/ai-threat-detector
            dockerfile: apps/ai-threat-detector/Dockerfile
          - image: neuromesh-agent-ebpf-sensor
            context: .
            dockerfile: apps/agent-ebpf-sensor/Dockerfile
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          tags: ${{ matrix.image }}:ci
          load: true
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}

      - name: Generate SBOM (SPDX)
        uses: anchore/sbom-action@v0
        with:
          image: ${{ matrix.image }}:ci
          format: spdx-json
          output-file: ${{ matrix.image }}-sbom.spdx.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ matrix.image }}
          path: ${{ matrix.image }}-sbom.spdx.json
          retention-days: 30

      - name: Scan image for CVEs (Trivy)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ matrix.image }}:ci
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: 1
          format: sarif
          output: trivy-${{ matrix.image }}.sarif

      - name: Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-${{ matrix.image }}.sarif
          category: trivy-${{ matrix.image }}
