name: AI Model Promotion

on:
  push:
    branches: [main]
    paths:
      - apps/ai-threat-detector/src/inference/**
      - apps/ai-threat-detector/models/**
  pull_request:
    branches: [main]
    paths:
      - apps/ai-threat-detector/src/inference/**
      - apps/ai-threat-detector/models/**

concurrency:
  group: ai-model-promotion-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.12"
  MODEL_ARTIFACT_NAME: gnn-model-weights
  MODEL_ARTIFACT_PATH: apps/ai-threat-detector/models

jobs:
  gnn-evaluator-validation:
    name: GNN Inference Validation
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: apps/ai-threat-detector
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: apps/ai-threat-detector/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt pytest

      - name: Upload GNN model weights artifact (if present)
        uses: actions/upload-artifact@v4
        if: hashFiles('apps/ai-threat-detector/models/**') != ''
        with:
          name: ${{ env.MODEL_ARTIFACT_NAME }}
          path: ${{ env.MODEL_ARTIFACT_PATH }}/
          retention-days: 30
          if-no-files-found: ignore

      - name: Run inference unit tests
        run: python -m unittest discover -s tests -v

      - name: Validate GNN evaluator logic
        run: |
          python - <<'PY'
          import unittest

          from src.inference.gnn_evaluator import GNNEvaluator, DEFAULT_EDGE_GROWTH_THRESHOLD
          from src.inference.anomaly_pipeline import AnomalyPipeline
          from src.streaming.kafka_consumer import TelemetryEnvelope, SCHEMA_VERSION, BEHAVIOR_ALERT

          class GNNPromotionGate(unittest.TestCase):
              def test_evaluator_threshold_is_configured(self) -> None:
                  evaluator = GNNEvaluator()
                  self.assertGreater(evaluator.edge_growth_threshold, 0)
                  self.assertEqual(
                      evaluator.edge_growth_threshold,
                      DEFAULT_EDGE_GROWTH_THRESHOLD,
                  )

              def test_pipeline_routes_behavior_alert(self) -> None:
                  import asyncio

                  pipeline = AnomalyPipeline(
                      evaluator=GNNEvaluator(edge_growth_threshold=1, growth_window_secs=60.0)
                  )
                  envelope = TelemetryEnvelope(
                      event_id="promotion-gate-1",
                      timestamp_ns=1,
                      node_name="ci-node",
                      schema_version=SCHEMA_VERSION,
                      alert_type=BEHAVIOR_ALERT,
                      payload={
                          "ppid": 100,
                          "last_pid": 101,
                          "last_comm": "bash",
                          "last_binary_path": "/usr/bin/bash",
                          "spawn_count": 4,
                      },
                  )
                  asyncio.run(pipeline.handle(envelope))
                  self.assertEqual(pipeline.stats.behavior_alerts, 1)
                  self.assertGreaterEqual(pipeline.evaluator.edge_count, 1)

          suite = unittest.defaultTestLoader.loadTestsFromTestCase(GNNPromotionGate)
          result = unittest.TextTestRunner(verbosity=2).run(suite)
          if not result.wasSuccessful():
              raise SystemExit(1)
          print("GNN promotion gate passed.")
          PY

      - name: Promotion gate summary
        run: |
          echo "MLOps promotion gate: inference path validated for deployment readiness."

  inference-sanity:
    name: Inference Sanity (placeholder)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: gnn-evaluator-validation
    defaults:
      run:
        working-directory: apps/ai-threat-detector
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: apps/ai-threat-detector/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt pytest

      - name: Download GNN model weights artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.MODEL_ARTIFACT_NAME }}
          path: ${{ env.MODEL_ARTIFACT_PATH }}/
        continue-on-error: true

      - name: Run inference sanity test
        run: |
          if [ -f tests/inference_sanity.py ]; then
            python -m pytest tests/inference_sanity.py -v
          else
            echo "::notice::Placeholder — tests/inference_sanity.py not yet committed; skipping minimal inference gate."
          fi
