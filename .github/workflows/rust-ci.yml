name: Rust Enterprise CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build-kernel-ebpf:
    name: Ring 0 Kernel Space (eBPF)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Install Rust Nightly
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src

      - name: Install bpf-linker
        run: cargo install bpf-linker

      - name: Build eBPF Bytecode
        working-directory: apps/agent-ebpf-sensor/ebpf
        run: cargo build --target bpfel-unknown-none -Z build-std=core --release

  build-user-orchestrator:
    name: User Space & Security Gates
    runs-on: ubuntu-latest
    needs: build-kernel-ebpf
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Rust Stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Cargo Registry
        uses: Swatinem/rust-cache@v2

      - name: Check Formatting
        working-directory: apps/agent-ebpf-sensor
        run: cargo fmt --all -- --check

      - name: Build Orchestrator Release
        working-directory: apps/agent-ebpf-sensor
        run: cargo build --release