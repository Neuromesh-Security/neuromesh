name: Rust Enterprise CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build-and-verify:
    name: Dual-Path Sensor Compilation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Rust Nightly (for Ring 0)
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src

      - name: Install Rust Stable (for Orchestrator)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Install bpf-linker
        run: cargo install bpf-linker

      - name: Check Formatting
        working-directory: apps/agent-ebpf-sensor
        run: cargo fmt --all -- --check

      - name: 1. Build eBPF Kernel Space
        working-directory: apps/agent-ebpf-sensor/ebpf
        run: cargo build --target bpfel-unknown-none -Z build-std=core --release

      - name: 2. Build User Space Orchestrator
        working-directory: apps/agent-ebpf-sensor
        run: cargo build --release