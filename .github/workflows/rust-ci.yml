name: Rust Enterprise CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always
  BPF_ARTIFACT: ebpf/target/bpfel-unknown-none/release/agent-ebpf-sensor-ebpf

jobs:
  build-and-verify:
    name: Dual-Path Sensor Compilation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Rust Nightly (for Ring 0)
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src

      - name: Install Rust Stable (for Orchestrator)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Install bpf-linker
        run: cargo install bpf-linker

      - name: Check Formatting
        working-directory: apps/agent-ebpf-sensor
        run: cargo fmt --all -- --check

      - name: 1. Build eBPF Kernel Space
        working-directory: apps/agent-ebpf-sensor/ebpf
        env:
          CARGO_TARGET_BPFEL_UNKNOWN_NONE_LINKER: bpf-linker
        run: |
          cargo +nightly build --package agent-ebpf-sensor-ebpf --target bpfel-unknown-none -Z build-std=core --release
          ARTIFACT="target/bpfel-unknown-none/release/agent-ebpf-sensor-ebpf"
          if [ ! -f "$ARTIFACT" ]; then
            echo "Expected eBPF artifact missing at ebpf/${ARTIFACT}"
            find target -type f | sort
            exit 1
          fi
          ls -la "$ARTIFACT"

      - name: Verify eBPF artifact for include_bytes!
        working-directory: apps/agent-ebpf-sensor
        run: |
          test -f "$BPF_ARTIFACT"
          ls -la "$BPF_ARTIFACT"

      - name: 2. Build User Space Orchestrator
        working-directory: apps/agent-ebpf-sensor
        run: cargo +stable build --release
