name: Production CI

on:
  push:
    branches: [main]
    # Non-core services (see experimental-ci.yml) have their own,
    # independent pipeline. A push/PR that touches ONLY those paths must
    # not trigger this core workflow at all -- if a change also touches
    # any core path, this still runs as normal (paths-ignore only skips
    # the run when every changed file matches the ignore list).
    paths-ignore:
      - apps/ai-threat-detector/**
      - apps/security-dashboard/**
  pull_request:
    branches: [main]
    paths-ignore:
      - apps/ai-threat-detector/**
      - apps/security-dashboard/**

concurrency:
  group: production-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  BPF_ARTIFACT: ebpf/target/bpfel-unknown-none/release/agent-ebpf-sensor-ebpf
  BPF_ARTIFACT_PATH: apps/agent-ebpf-sensor/ebpf/target/bpfel-unknown-none/release/agent-ebpf-sensor-ebpf
  NEUROMESH_PERF_BASELINE_EPS: "100000"
  NEUROMESH_PERF_REGRESSION_PCT: "5"
  NEUROMESH_E2E_TIMEOUT_SECS: "30"
  NEUROMESH_MIN_GNN_SCORE: "0.8"
  # Registry for pushed + Cosign-signed images. The owner segment is
  # computed per-job from github.repository_owner (see the "Compute
  # lowercase image owner" step in build-docker) rather than hardcoded here,
  # since GHCR repository paths require lowercase and github.repository_owner
  # preserves the org's display casing (e.g. "Neuromesh-Security").
  REGISTRY: ghcr.io

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Rust Stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            .
            apps/agent-ebpf-sensor
            apps/agent-ebpf-sensor/ebpf

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Install clang (C BPF visibility object)
        run: sudo apt-get update && sudo apt-get install -y clang llvm cmake g++ gcc build-essential pkg-config libssl-dev libcurl4-openssl-dev libsasl2-dev zlib1g-dev

      - name: Clippy (strict)
        run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [lint, build-ebpf]
    env:
      CARGO_TARGET_DIR: target/ci-test
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Rust Stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            .
            apps/agent-ebpf-sensor

      - name: Install cargo-llvm-cov
        run: cargo install cargo-llvm-cov

      - name: Install native build deps (orchestrator + C BPF)
        run: sudo apt-get update && sudo apt-get install -y clang llvm cmake g++ gcc build-essential pkg-config libssl-dev libcurl4-openssl-dev libsasl2-dev zlib1g-dev

      - name: cargo check — workspace libraries
        run: |
          cargo check -p neuromesh-common
          cargo check -p neuromesh-telemetry --all-targets
          cargo check -p agent-ebpf-sensor --lib --all-targets
          cargo check -p neuromesh-integration-tests --all-targets

      - name: Integration tests (kernel-independent)
        run: cargo test -p neuromesh-integration-tests

      - name: Unit tests — sensor library
        run: cargo test -p agent-ebpf-sensor --lib

      - name: Download eBPF bytecode (orchestrator compile gate)
        uses: actions/download-artifact@v4
        with:
          name: ebpf-bytecode-6.8+
          path: apps/agent-ebpf-sensor/ebpf/target/bpfel-unknown-none/release

      - name: Export eBPF bytecode path for orchestrator builds
        run: |
          BPF="${GITHUB_WORKSPACE}/apps/agent-ebpf-sensor/ebpf/target/bpfel-unknown-none/release/agent-ebpf-sensor-ebpf"
          ls -la "$(dirname "$BPF")"
          test -f "$BPF"
          echo "NEUROMESH_EBPF_ENFORCEMENT_BYTECODE=${BPF}" >> "${GITHUB_ENV}"

      - name: Enterprise sensor tests (fuzz + chaos harness)
        run: |
          cargo test -p agent-ebpf-sensor --test event_parser_fuzz_test
          cargo test -p agent-ebpf-sensor --test chaos_engineering_test --features orchestrator
          cargo test -p agent-ebpf-sensor --test execve_stress_test --no-run

      - name: Unit tests — telemetry
        run: cargo test -p neuromesh-telemetry

      - name: Coverage gate (≥70% line coverage)
        run: |
          cargo llvm-cov \
            --package agent-ebpf-sensor \
            --package neuromesh-common \
            --package neuromesh-telemetry \
            --lib \
            --fail-under-lines 70

      - name: Verify benchmark harness compiles
        run: cargo bench -p agent-ebpf-sensor --no-run

  build-ebpf:
    name: Build eBPF (${{ matrix.kernel }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 15
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        include:
          - kernel: "5.15"
            runner: ubuntu-22.04
          - kernel: "6.1"
            runner: ubuntu-22.04
          - kernel: "6.8+"
            runner: ubuntu-24.04
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Report runner kernel
        run: uname -r

      - name: Install Rust Nightly (eBPF prerequisite)
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src

      - name: Cache Rust dependencies (BPF)
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/agent-ebpf-sensor/ebpf
          shared-key: ebpf-${{ matrix.kernel }}
          cache-on-failure: true

      - name: Install bpf-linker
        run: cargo install bpf-linker --locked

      - name: Build eBPF kernel space
        working-directory: apps/agent-ebpf-sensor/ebpf
        env:
          CARGO_TARGET_BPFEL_UNKNOWN_NONE_LINKER: bpf-linker
        run: |
          cargo +nightly build \
            --package agent-ebpf-sensor-ebpf \
            --target bpfel-unknown-none \
            -Z build-std=core \
            --release
          test -f target/bpfel-unknown-none/release/agent-ebpf-sensor-ebpf

      - name: Upload eBPF bytecode artifact
        uses: actions/upload-artifact@v4
        with:
          name: ebpf-bytecode-${{ matrix.kernel }}
          path: apps/agent-ebpf-sensor/ebpf/target/bpfel-unknown-none/release/agent-ebpf-sensor-ebpf
          retention-days: 14
          if-no-files-found: error

  ebpf-verifier-check:
    name: eBPF Verifier (${{ matrix.kernel }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 10
    needs: build-ebpf
    env:
      NEUROMESH_VERIFY_CARGO_TARGET_DIR: target/ebpf-verifier-sudo-${{ matrix.kernel }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - kernel: "5.15"
            runner: ubuntu-22.04
          - kernel: "6.1"
            runner: ubuntu-22.04
          - kernel: "6.8+"
            runner: ubuntu-24.04
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download eBPF bytecode (${{ matrix.kernel }})
        uses: actions/download-artifact@v4
        with:
          name: ebpf-bytecode-${{ matrix.kernel }}
          path: apps/agent-ebpf-sensor/ebpf/target/bpfel-unknown-none/release

      - name: Install Rust Stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install clang (C BPF visibility object)
        run: sudo apt-get update && sudo apt-get install -y clang llvm cmake g++ gcc build-essential pkg-config libssl-dev libcurl4-openssl-dev libsasl2-dev zlib1g-dev

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            .
            apps/agent-ebpf-sensor
          shared-key: ebpf-verifier-${{ matrix.runner }}-${{ matrix.kernel }}

      - name: Build C visibility bytecode
        working-directory: apps/agent-ebpf-sensor
        run: |
          mkdir -p target/bpf
          for src in sys_exec.bpf.c network_filter.bpf.c; do
            base="${src%.bpf.c}"
            clang -g -O2 -target bpf -D__TARGET_ARCH_x86 -I src/bpf -c "src/bpf/${src}" -o "target/bpf/${base}.bpf.o"
            llvm-objcopy --remove-section=.BTF.ext "target/bpf/${base}.bpf.o"
          done

      - name: Verify Rust enforcement bytecode
        run: bash scripts/ci/verify_ebpf_bytecode.sh "${{ env.BPF_ARTIFACT_PATH }}"

      - name: Verify C visibility bytecode
        run: |
          bash scripts/ci/verify_ebpf_bytecode.sh apps/agent-ebpf-sensor/target/bpf/sys_exec.bpf.o
          bash scripts/ci/verify_ebpf_bytecode.sh apps/agent-ebpf-sensor/target/bpf/network_filter.bpf.o

  performance-regression:
    name: Performance Regression
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: lint
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Rust Stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            .
            apps/agent-ebpf-sensor

      - name: Run events/sec regression gate
        run: bash scripts/benchmarks/events_per_second.sh

  e2e-detection-test:
    name: E2E Detection Test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: lint
    # NOTE (CI blast-radius review, 2026-07-17): this job's script
    # (scripts/e2e/validate_gnn_detection.sh) boots ai-threat-detector
    # alongside zt-policy-engine to validate the full detection pipeline,
    # so it is intentionally NOT moved to experimental-ci.yml with the
    # rest of ai-threat-detector's checks -- doing so would remove
    # zt-policy-engine's only E2E coverage in this workflow, which is out
    # of scope for this change. This is a disclosed, accepted residual
    # coupling: a flaky/slow ai-threat-detector container can still fail
    # this one core-adjacent check.
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run attack simulation and GNN insight probe
        run: bash scripts/e2e/validate_gnn_detection.sh

  build-docker:
    name: Build Docker (${{ matrix.image }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: build-ebpf
    permissions:
      contents: read
      # Required to push to GHCR with the ambient GITHUB_TOKEN below.
      packages: write
    strategy:
      fail-fast: false
      # neuromesh-ai-threat-detector is intentionally NOT in this matrix.
      # It is a non-core service (see docs/threat-model.md "Out of scope");
      # its build/sign/verify now lives in the fully independent
      # .github/workflows/experimental-ci.yml so a failure or slowness in
      # that service's build can never delay or block this core job, which
      # (via the shared `needs: build-ebpf` above) is on the critical path
      # for agent-ebpf-sensor and zt-policy-engine.
      matrix:
        include:
          - image: neuromesh-zt-policy-engine
            context: apps/zt-policy-engine
            dockerfile: apps/zt-policy-engine/Dockerfile
          - image: neuromesh-agent-ebpf-sensor
            context: .
            dockerfile: apps/agent-ebpf-sensor/Dockerfile
            needs_ebpf: true
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download eBPF bytecode (6.8+ matrix artifact)
        if: matrix.needs_ebpf == true
        uses: actions/download-artifact@v4
        with:
          name: ebpf-bytecode-6.8+
          path: apps/agent-ebpf-sensor/ebpf/target/bpfel-unknown-none/release

      - name: Install Rust Stable
        if: matrix.needs_ebpf == true
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies (orchestrator)
        if: matrix.needs_ebpf == true
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/agent-ebpf-sensor
          shared-key: docker-orchestrator-${{ matrix.image }}

      - name: Install native build deps (rdkafka)
        if: matrix.needs_ebpf == true
        run: sudo apt-get update && sudo apt-get install -y cmake pkg-config libssl-dev build-essential gcc g++ libcurl4-openssl-dev libsasl2-dev zlib1g-dev clang llvm

      - name: Build user-space orchestrator
        if: matrix.needs_ebpf == true
        working-directory: apps/agent-ebpf-sensor
        run: |
          test -f "$BPF_ARTIFACT"
          cargo build --features orchestrator --release

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Images are only pushed to the registry (and therefore only signed
      # below) on push to main. PR builds are built + loaded locally and
      # inspected below for a fast build-sanity gate, but are never pushed:
      # there is no registry reference to sign, and forked-repo PRs do not
      # have access to the COSIGN_PRIVATE_KEY secret by GitHub Actions design.
      - name: Determine whether to push + sign this build
        id: publish
        run: |
          if [ "${{ github.event_name }}" = "push" ] && [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
          fi

      # GHCR_PAT is a classic PAT scoped to write:packages, provisioned as a
      # repository secret specifically to authenticate this login step
      # against ghcr.io (independent of the org's GITHUB_TOKEN "Workflow
      # permissions" ceiling -- see git history for the prior incident this
      # resolved).
      - name: Log in to GitHub Container Registry
        if: steps.publish.outputs.should_publish == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      # Docker/GHCR repository paths must be all-lowercase, but
      # github.repository_owner preserves the org's display casing (e.g.
      # "Neuromesh-Security"), and GitHub Actions expressions have no
      # built-in lower() function -- compute it once here with a shell
      # step and reuse the output everywhere an image reference is built.
      - name: Compute lowercase image owner (Docker/GHCR tags require lowercase)
        id: owner
        run: echo "lower=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      # Root cause of the prior "auth.docker.io/token...401 Unauthorized"
      # failure (reproduced locally with `docker push` before this fix,
      # 2026-07-16): every tag in this list is pushed whenever `push` is
      # true, and any tag WITHOUT an explicit registry host (e.g. the old
      # bare "${{ matrix.image }}:ci") is resolved by Docker to
      # docker.io/library/... by default -- an anonymous Docker Hub push
      # attempt, entirely unrelated to the ghcr.io login above, which then
      # 401s. Every tag below is therefore explicitly ghcr.io-prefixed; none
      # are bare, so there is no tag left that can silently fall back to
      # Docker Hub.
      - name: Build Docker image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          tags: |
            ${{ env.REGISTRY }}/${{ steps.owner.outputs.lower }}/${{ matrix.image }}:ci
            ${{ env.REGISTRY }}/${{ steps.owner.outputs.lower }}/${{ matrix.image }}:${{ github.sha }}
          load: true
          push: ${{ steps.publish.outputs.should_publish == 'true' }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}

      - name: Verify image
        run: docker image inspect ${{ env.REGISTRY }}/${{ steps.owner.outputs.lower }}/${{ matrix.image }}:ci

      # --- Cosign static-key signing -------------------------------------
      # Matches apps/k8s-admission-webhook/src/validation/verifier.go's
      # default NEUROMESH_COSIGN_VERIFY_MODE=key trust root exactly: a
      # single static keypair, no Fulcio/keyless, no Rekor transparency-log
      # requirement (webhook runs with IgnoreTlog=true). Signing is keyed to
      # the immutable digest produced by the push above, never a mutable
      # tag, so this cannot be bypassed by re-tagging after the fact.
      - name: Install Cosign
        if: steps.publish.outputs.should_publish == 'true'
        uses: sigstore/cosign-installer@v3

      - name: Sign pushed image with Cosign (static key)
        if: steps.publish.outputs.should_publish == 'true'
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
        run: |
          cosign sign --key env://COSIGN_PRIVATE_KEY --yes \
            "${{ env.REGISTRY }}/${{ steps.owner.outputs.lower }}/${{ matrix.image }}@${{ steps.build.outputs.digest }}"

      # Fail-fast gate: prove the signature this job just produced actually
      # verifies against the public key *before* the pipeline reports green,
      # rather than discovering a broken signing setup only when the
      # admission webhook later denies every pod in the cluster.
      - name: Verify Cosign signature (fail-fast)
        if: steps.publish.outputs.should_publish == 'true'
        env:
          COSIGN_PUBLIC_KEY: ${{ secrets.COSIGN_PUBLIC_KEY }}
        run: |
          cosign verify --key env://COSIGN_PUBLIC_KEY \
            "${{ env.REGISTRY }}/${{ steps.owner.outputs.lower }}/${{ matrix.image }}@${{ steps.build.outputs.digest }}"
