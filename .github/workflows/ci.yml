name: Production CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  BPF_ARTIFACT: ebpf/target/bpfel-unknown-none/release/agent-ebpf-sensor-ebpf

jobs:
  quality-gates:
    name: Lint, Check & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Rust Stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy, llvm-tools-preview

      - name: Install Rust Nightly (eBPF prerequisite)
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src

      - name: Install cargo-llvm-cov
        run: cargo install cargo-llvm-cov

      - name: Check Formatting (workspace)
        run: cargo +stable fmt --all -- --check

      - name: cargo check — workspace libraries
        run: |
          cargo +stable check -p neuromesh-common
          cargo +stable check -p neuromesh-telemetry --all-targets
          cargo +stable check -p agent-ebpf-sensor --lib --all-targets
          cargo +stable check -p neuromesh-integration-tests --all-targets

      - name: Integration tests (kernel-independent)
        run: cargo +stable test -p neuromesh-integration-tests

      - name: Unit tests — sensor library
        run: cargo +stable test -p agent-ebpf-sensor --lib

      - name: Unit tests — telemetry
        run: cargo +stable test -p neuromesh-telemetry

      - name: Coverage gate (≥70% line coverage)
        run: |
          cargo llvm-cov \
            --package agent-ebpf-sensor \
            --package neuromesh-common \
            --package neuromesh-telemetry \
            --lib \
            --fail-under-lines 70

      - name: cargo clippy — workspace
        run: |
          cargo +stable clippy -p agent-ebpf-sensor --lib -- -D warnings
          cargo +stable clippy -p neuromesh-telemetry --all-targets -- -D warnings
          cargo +stable clippy -p neuromesh-integration-tests --all-targets -- -D warnings

      - name: Install bpf-linker
        run: cargo install bpf-linker

      - name: Build eBPF Kernel Space
        working-directory: apps/agent-ebpf-sensor/ebpf
        env:
          CARGO_TARGET_BPFEL_UNKNOWN_NONE_LINKER: bpf-linker
        run: |
          cargo +nightly build --package agent-ebpf-sensor-ebpf --target bpfel-unknown-none -Z build-std=core --release
          test -f target/bpfel-unknown-none/release/agent-ebpf-sensor-ebpf

      - name: Build User Space Orchestrator
        working-directory: apps/agent-ebpf-sensor
        run: |
          test -f "$BPF_ARTIFACT"
          cargo +stable build --features orchestrator --release

  ebpf-cross-compile:
    name: eBPF Cross-Compile (${{ matrix.arch }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            arch: x86_64
          - runner: ubuntu-24.04-arm
            arch: aarch64
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Rust Nightly
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src

      - name: Install bpf-linker
        run: cargo install bpf-linker

      - name: Cross-compile eBPF (${{ matrix.arch }})
        working-directory: apps/agent-ebpf-sensor/ebpf
        env:
          CARGO_TARGET_BPFEL_UNKNOWN_NONE_LINKER: bpf-linker
        run: |
          cargo +nightly build --package agent-ebpf-sensor-ebpf --target bpfel-unknown-none -Z build-std=core --release
          ls -la target/bpfel-unknown-none/release/agent-ebpf-sensor-ebpf
